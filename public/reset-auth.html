<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Resetting RBT Genius</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }

      .card {
        width: min(92vw, 420px);
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #ffffff;
        box-shadow: 0 24px 80px -40px rgba(15, 23, 42, 0.35);
        padding: 32px 28px;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #1e5eff;
        color: white;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 16px;
      }

      .muted {
        color: #64748b;
        line-height: 1.6;
      }

      .stamp {
        margin-top: 14px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1e5eff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">RG</div>
      <h1>Resetting local app state…</h1>
      <p class="muted">
        We are clearing the old browser client for this domain and sending you back
        to the fresh login screen.
      </p>
      <p class="stamp">reset-auth-2026-04-24</p>
    </div>
    <script>
      (async () => {
        try {
          const keysToPreserve = ["rbt_genius_theme"];
          const preserved = new Map();

          for (const key of keysToPreserve) {
            const value = window.localStorage.getItem(key);
            if (value !== null) {
              preserved.set(key, value);
            }
          }

          window.localStorage.clear();
          window.sessionStorage.clear();

          preserved.forEach((value, key) => {
            window.localStorage.setItem(key, value);
          });

          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              registrations.map((registration) => registration.unregister().catch(() => false)),
            );
          }

          if ("caches" in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((key) => caches.delete(key).catch(() => false)));
          }
        } catch (error) {
          console.error("Failed to fully reset auth state", error);
        } finally {
          window.location.replace(`/login?reset=${Date.now()}`);
        }
      })();
    </script>
  </body>
</html>
